<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EM QR</title>
<style>
html,body{
margin:0;
height:100%;
}
iframe{
width:100%;
height:100vh;
border:none;
}
</style>
</head>
<body>

<iframe id="pdf"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if(file){
document.getElementById("pdf").src="/" + file;
}
</script>

</body>
</html>
